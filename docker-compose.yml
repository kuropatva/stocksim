version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    image: myapp:dev
    restart: always
    deploy:
      replicas: 3
    environment:
      DB_USERNAME: user
      DB_PASSWORD: password
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - app

volumes:
  db_data:
